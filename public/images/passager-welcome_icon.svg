<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="skyBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4682B4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B0E0E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="rgba(70, 130, 180, 0.3)"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#skyBlueGradient)" filter="url(#shadow)" opacity="0.1"/>
  
  <!-- Bus body -->
  <rect x="40" y="80" width="120" height="60" rx="15" ry="15" fill="url(#skyBlueGradient)" filter="url(#shadow)"/>
  
  <!-- Bus windows -->
  <rect x="50" y="90" width="25" height="20" rx="3" ry="3" fill="url(#lightBlueGradient)"/>
  <rect x="80" y="90" width="25" height="20" rx="3" ry="3" fill="url(#lightBlueGradient)"/>
  <rect x="110" y="90" width="25" height="20" rx="3" ry="3" fill="url(#lightBlueGradient)"/>
  <rect x="140" y="90" width="15" height="20" rx="3" ry="3" fill="url(#lightBlueGradient)"/>
  
  <!-- Bus door -->
  <rect x="45" y="115" width="15" height="20" rx="2" ry="2" fill="#4682B4"/>
  
  <!-- Bus wheels -->
  <circle cx="60" cy="145" r="8" fill="#4682B4"/>
  <circle cx="140" cy="145" r="8" fill="#4682B4"/>
  <circle cx="60" cy="145" r="4" fill="#87CEEB"/>
  <circle cx="140" cy="145" r="4" fill="#87CEEB"/>
  
  <!-- Welcome text -->
  <text x="100" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="url(#skyBlueGradient)">BIENVENUE</text>
  <text x="100" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4682B4">PASSAGER</text>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="3" fill="#87CEEB" opacity="0.6"/>
  <circle cx="170" cy="35" r="2" fill="#B0E0E6" opacity="0.8"/>
  <circle cx="25" cy="170" r="2.5" fill="#87CEEB" opacity="0.7"/>
  <circle cx="175" cy="165" r="2" fill="#4682B4" opacity="0.5"/>
  
  <!-- Motion lines for modern effect -->
  <line x1="165" y1="100" x2="185" y2="100" stroke="#87CEEB" stroke-width="2" opacity="0.6"/>
  <line x1="165" y1="105" x2="180" y2="105" stroke="#87CEEB" stroke-width="2" opacity="0.4"/>
  <line x1="165" y1="110" x2="175" y2="110" stroke="#87CEEB" stroke-width="2" opacity="0.3"/>
</svg>